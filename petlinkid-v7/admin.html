<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PetLinkID — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --amber:#F59E0B; --amber-light:#FEF3C7; --amber-mid:#FDE68A;
  --green:#10B981; --green-light:#D1FAE5;
  --red:#EF4444; --red-light:#FEE2E2;
  --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
  --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280;
  --gray-600:#4B5563; --gray-700:#374151; --gray-800:#1F2937; --gray-900:#111827;
  --white:#FFFFFF;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--gray-200);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-left img{height:34px;width:auto;border-radius:8px;}
.header-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;color:var(--gray-900);}
.header-badge{background:var(--amber-light);border:1px solid var(--amber-mid);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;color:#92400E;}

/* BODY */
.body{max-width:900px;margin:0 auto;padding:24px 20px 60px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:16px;padding:18px 16px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-card .num{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:30px;color:var(--amber);line-height:1;}
.stat-card .lbl{font-size:12px;font-weight:500;color:var(--gray-500);margin-top:4px;}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--gray-100);padding:5px;border-radius:14px;margin-bottom:24px;}
.tab{flex:1;padding:10px 8px;border:none;background:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.18s;color:var(--gray-500);}
.tab.active{background:var(--white);color:var(--gray-900);box-shadow:var(--shadow-sm);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
.card-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;color:var(--gray-900);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title span{color:var(--amber);}

/* FIELDS */
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--gray-900);background:var(--white);outline:none;transition:border-color 0.15s,box-shadow 0.15s;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,0.1);}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* BUTTONS */
.btn{padding:11px 20px;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all 0.18s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--amber);color:var(--white);box-shadow:0 2px 12px rgba(245,158,11,0.3);}
.btn-primary:hover{background:#D97706;}
.btn-primary:disabled{opacity:0.55;cursor:not-allowed;}
.btn-outline{background:var(--white);border:1.5px solid var(--gray-200);color:var(--gray-700);}
.btn-outline:hover{border-color:var(--amber);color:var(--gray-900);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FEE2E2;}
.btn-full{width:100%;justify-content:center;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

/* QR GRID */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:18px;}
.qr-card{background:var(--white);border:1px solid var(--gray-200);border-radius:16px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);transition:box-shadow 0.15s;}
.qr-card:hover{box-shadow:var(--shadow-md);}
.qc-id{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:6px;letter-spacing:0.04em;}
.qc-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600;margin-bottom:8px;}
.qc-badge.inactive{background:var(--gray-100);color:var(--gray-500);}
.qc-badge.active{background:var(--green-light);color:var(--green);}
.qc-qr{margin:8px auto;}
.qc-url{font-size:9px;color:var(--gray-400);word-break:break-all;margin-top:6px;line-height:1.4;}
.qc-actions{display:flex;gap:5px;margin-top:10px;}
.qc-btn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid var(--gray-200);background:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--gray-600);transition:all 0.15s;}
.qc-btn:hover{background:var(--amber-light);border-color:var(--amber);color:var(--gray-900);}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--gray-200);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--gray-50);}
th{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray-500);text-align:left;padding:11px 16px;border-bottom:1px solid var(--gray-200);}
td{padding:12px 16px;border-bottom:1px solid var(--gray-100);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FFFDF7;}
.t-id{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;color:var(--gray-700);}
.t-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.t-badge.inactive{background:var(--gray-100);color:var(--gray-500);}
.t-badge.active{background:var(--green-light);color:var(--green);}
.t-date{font-size:12px;color:var(--gray-400);}

/* SINGLE QR */
.single-qr-center{text-align:center;padding:20px 0;}
#singleQrDiv{display:inline-block;padding:16px;border:2px solid var(--amber-light);border-radius:16px;background:var(--white);}
.single-url{font-family:monospace;font-size:12px;color:var(--gray-500);margin:12px 0;word-break:break-all;background:var(--gray-50);border-radius:8px;padding:8px 12px;}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:14px;font-family:'Outfit',sans-serif;outline:none;background:var(--white);}
.search-input:focus{border-color:var(--amber);}
.filter-select{padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:14px;font-family:'Outfit',sans-serif;outline:none;background:var(--white);-webkit-appearance:none;appearance:none;cursor:pointer;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400);}
.empty-state .es-icon{font-size:40px;margin-bottom:12px;display:block;}
.empty-state p{font-size:14px;line-height:1.5;}

/* LOADING */
.loading-state{text-align:center;padding:32px;color:var(--gray-400);font-size:14px;}

/* TOAST */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(16px);background:var(--gray-900);color:var(--white);padding:12px 20px;border-radius:100px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* PRINT */
@media print{.header,.tabs,.no-print{display:none!important;}#printTarget{border:none!important;padding:0!important;box-shadow:none!important;}.qr-grid{grid-template-columns:repeat(4,1fr)!important;}.qc-actions{display:none!important;}}

/* MOBILE */
@media(max-width:640px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .row3{grid-template-columns:1fr;}
  .body{padding:16px 16px 60px;}
  .header{padding:14px 16px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="icons/icon-192.png" alt="PetLinkID">
    <span class="header-title">Panel Admin</span>
  </div>
  <div class="header-badge">⚙️ Emprendedor</div>
</div>

<div class="body">

  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Tags generados</div></div>
    <div class="stat-card"><div class="num" id="statActive">—</div><div class="lbl">Activados</div></div>
    <div class="stat-card"><div class="num" id="statInactive">—</div><div class="lbl">Sin activar</div></div>
    <div class="stat-card"><div class="num" id="statRate">—</div><div class="lbl">Tasa activación</div></div>
  </div>

  <div class="tabs no-print">
    <button class="tab active" data-tab="batch">📦 Lote</button>
    <button class="tab" data-tab="single">🎯 Individual</button>
    <button class="tab" data-tab="list">📋 Mis tags</button>
  </div>

  <!-- BATCH -->
  <div id="tabBatch" class="tab-panel active">
    <div class="card">
      <div class="card-title">📦 Generar <span>lote de QRs</span></div>
      <div class="row3">
        <div class="field"><label>Cantidad</label><input type="number" id="batchQty" value="10" min="1" max="500"></div>
        <div class="field"><label>Prefijo</label><input type="text" id="batchPrefix" value="PLK" maxlength="3"></div>
        <div class="field"><label>Tamaño QR</label>
          <select id="batchSize">
            <option value="120">120px — Sticker</option>
            <option value="160" selected>160px — Estándar</option>
            <option value="200">200px — Grande</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Dominio base</label><input type="text" id="batchDomain" value="https://petlinkid.app/tag.html?id="></div>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnGenBatch">⚡ Generar QRs</button>
        <button class="btn btn-outline no-print" id="btnPrint">🖨️ Imprimir</button>
        <button class="btn btn-outline no-print" id="btnExport">📊 CSV</button>
        <button class="btn btn-danger no-print" id="btnClear">🗑️ Limpiar</button>
      </div>
    </div>
    <div class="card" id="printTarget">
      <div class="card-title">QRs generados <span id="batchCount"></span></div>
      <div class="qr-grid" id="qrGrid">
        <div class="empty-state" style="grid-column:1/-1;">
          <span class="es-icon">📦</span>
          <p>Configura los parámetros<br>y presiona "Generar QRs"</p>
        </div>
      </div>
    </div>
  </div>

  <!-- SINGLE -->
  <div id="tabSingle" class="tab-panel">
    <div class="card">
      <div class="card-title">🎯 QR <span>individual</span></div>
      <div class="row2">
        <div class="field"><label>ID del tag</label><input type="text" id="singleId" placeholder="Ej: PLK-A7X29K"></div>
        <div class="field"><label>Tamaño</label>
          <select id="singleSize">
            <option value="120">120px</option>
            <option value="160" selected>160px</option>
            <option value="200">200px</option>
            <option value="256">256px</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Dominio</label><input type="text" id="singleDomain" value="https://petlinkid.app/tag.html?id="></div>
      <button class="btn btn-primary btn-full" id="btnGenSingle">🎯 Generar QR</button>
    </div>
    <div class="card" id="singleResult" style="display:none;">
      <div class="card-title">QR: <span id="singleIdDisplay"></span></div>
      <div class="single-qr-center">
        <div id="singleQrDiv"></div>
        <div class="single-url" id="singleUrlDisplay"></div>
        <div class="btn-group" style="justify-content:center;margin-top:14px;">
          <button class="btn btn-primary" id="btnDlSingle">⬇️ Descargar PNG</button>
          <button class="btn btn-outline" id="btnPrintSingle">🖨️ Imprimir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div id="tabList" class="tab-panel">
    <div class="card">
      <div class="card-title">📋 Todos tus <span>tags</span> <span id="loadingIndicator" style="font-family:'Outfit',sans-serif;font-weight:400;font-size:13px;color:var(--gray-400);">cargando...</span></div>
      <div class="search-bar">
        <input type="text" class="search-input" id="searchTags" placeholder="🔍 Buscar por ID o mascota...">
        <select class="filter-select" id="filterStatus">
          <option value="all">Todos</option>
          <option value="active">✅ Activos</option>
          <option value="inactive">⚪ Sin activar</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID Tag</th><th>Estado</th><th>Mascota</th><th>Creado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tagTableBody">
            <tr><td colspan="5" class="loading-state">Conectando con Firebase...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, writeBatch }
                               from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const db = getFirestore(initializeApp({
  apiKey:            "AIzaSyCjgL8d4Y7VRc_AY4WB9-4lPzIvmRc3iBE",
  authDomain:        "petlinkid-b3c94.firebaseapp.com",
  projectId:         "petlinkid-b3c94",
  storageBucket:     "petlinkid-b3c94.firebasestorage.app",
  messagingSenderId: "398210487374",
  appId:             "1:398210487374:web:de29580751b95e916b9f1f"
}));

let tags = [];
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3200);
}

// Realtime listener — metadata only
onSnapshot(collection(db, 'tags'), snap => {
  tags = snap.docs.map(d => {
    const data = d.data();
    return { id:d.id, status:data.status||'inactive', petName:data.pet?.name||null, createdAt:data.createdAt||data.activatedAt||'' };
  });
  updateStats();
  $('loadingIndicator').textContent = '';
  if ($('tabList').classList.contains('active')) renderList();
}, err => {
  toast('❌ Error Firebase: ' + err.message);
  $('loadingIndicator').textContent = '— sin conexión';
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', e => {
    const name = e.currentTarget.dataset.tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    $('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    e.currentTarget.classList.add('active');
    if (name === 'list') renderList();
  });
});

function makeId(prefix) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = prefix.toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,3) + '-';
  for (let i=0;i<6;i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}
function makeQR(container, url, size) {
  container.innerHTML = '';
  new QRCode(container, { text:url, width:size, height:size, colorDark:'#111827', colorLight:'#FFFFFF', correctLevel:QRCode.CorrectLevel.M });
}

// Batch generate
$('btnGenBatch').addEventListener('click', async () => {
  const qty    = Math.min(parseInt($('batchQty').value)||10, 500);
  const prefix = $('batchPrefix').value || 'PLK';
  const size   = parseInt($('batchSize').value);
  const domain = $('batchDomain').value.trim();
  if (!domain) { toast('⚠️ Ingresa el dominio base'); return; }
  const btn = $('btnGenBatch');
  btn.disabled=true; btn.textContent='⏳ Generando...';
  const grid = $('qrGrid');
  grid.innerHTML = '<div class="loading-state" style="grid-column:1/-1;">⏳ Registrando en Firebase...</div>';
  const existingIds = new Set(tags.map(t=>t.id));
  const newIds = [];
  for (let i=0;i<qty;i++) {
    let id, tries=0;
    do { id=makeId(prefix); tries++; } while(existingIds.has(id) && tries<1000);
    existingIds.add(id); newIds.push(id);
  }
  try {
    const CHUNK=499;
    for (let i=0;i<newIds.length;i+=CHUNK) {
      const batch=writeBatch(db);
      newIds.slice(i,i+CHUNK).forEach(id => batch.set(doc(db,'tags',id),{status:'inactive',createdAt:new Date().toISOString(),createdBy:'admin'}));
      await batch.commit();
    }
  } catch(e) { toast('❌ Error: '+e.message); btn.disabled=false; btn.textContent='⚡ Generar QRs'; return; }
  grid.innerHTML='';
  $('batchCount').textContent=`(${qty})`;
  newIds.forEach((id,i) => {
    const url=domain+id;
    const card=document.createElement('div');
    card.className='qr-card';
    card.innerHTML=`<div class="qc-id">${id}</div><div class="qc-badge inactive">Sin activar</div><div class="qc-qr" id="qr_${id}"></div><div class="qc-url">${url}</div><div class="qc-actions"><button class="qc-btn" data-dl="${id}">⬇️ PNG</button><button class="qc-btn" data-preview="${id}">👁</button></div>`;
    grid.appendChild(card);
    setTimeout(() => { const el=document.getElementById('qr_'+id); if(el) makeQR(el,url,size); }, Math.floor(i/10)*50+(i%10)*5);
  });
  grid.addEventListener('click', e => {
    const dlId=e.target.closest('[data-dl]')?.dataset.dl;
    const pvId=e.target.closest('[data-preview]')?.dataset.preview;
    if(dlId) downloadQR(dlId);
    if(pvId) window.open(`tag.html?id=${pvId}`,'_blank');
  });
  toast(`✅ ${qty} tags generados`);
  btn.disabled=false; btn.textContent='⚡ Generar QRs';
});

function downloadQR(id) {
  const el=document.getElementById('qr_'+id);
  const canvas=el?.querySelector('canvas');
  if(!canvas){toast('⚠️ QR no listo');return;}
  const a=document.createElement('a');
  a.download=`PetLinkID_${id}.png`; a.href=canvas.toDataURL('image/png'); a.click();
}

// Single generate
$('btnGenSingle').addEventListener('click', async () => {
  const rawId=$('singleId').value.trim().toUpperCase().replace(/\s/g,'');
  const size=parseInt($('singleSize').value);
  const domain=$('singleDomain').value.trim();
  if(!rawId){toast('⚠️ Ingresa un ID');return;}
  if(!domain){toast('⚠️ Ingresa el dominio');return;}
  const url=domain+rawId;
  $('singleResult').style.display='block';
  $('singleIdDisplay').textContent=rawId;
  $('singleUrlDisplay').textContent=url;
  makeQR($('singleQrDiv'),url,size);
  if(!tags.find(t=>t.id===rawId)) {
    try {
      await setDoc(doc(db,'tags',rawId),{status:'inactive',createdAt:new Date().toISOString(),createdBy:'admin'});
      toast('✅ Tag guardado en Firebase');
    } catch(e){toast('⚠️ Error: '+e.message);}
  } else toast('ℹ️ Este ID ya existe');
});
$('singleId').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase();});
$('btnDlSingle').addEventListener('click',()=>{
  const canvas=$('singleQrDiv').querySelector('canvas');
  if(!canvas){toast('⚠️ Genera el QR primero');return;}
  const id=$('singleId').value.trim().toUpperCase();
  const a=document.createElement('a'); a.download=`PetLinkID_${id}.png`; a.href=canvas.toDataURL('image/png'); a.click();
});
$('btnPrintSingle').addEventListener('click',()=>window.print());

// Print / Export / Clear
$('btnPrint').addEventListener('click',()=>{
  if(!$('qrGrid').querySelector('.qr-card')){toast('⚠️ Genera los QRs primero');return;}
  window.print();
});
$('btnExport').addEventListener('click',()=>{
  if(!tags.length){toast('⚠️ No hay tags');return;}
  const domain=$('batchDomain').value.trim()||'https://petlinkid.app/tag.html?id=';
  const rows=[['ID','URL','Estado','Mascota','Fecha']];
  tags.forEach(t=>rows.push([t.id,domain+t.id,t.status,t.petName||'',t.createdAt?.split('T')[0]||'']));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download=`PetLinkID_${new Date().toISOString().split('T')[0]}.csv`; a.click();
  toast('📊 CSV exportado');
});
$('btnClear').addEventListener('click',async()=>{
  const inactive=tags.filter(t=>t.status==='inactive');
  if(!inactive.length){toast('⚠️ No hay tags inactivos');return;}
  if(!confirm(`¿Borrar ${inactive.length} tags sin activar? Los activos se conservan.`)) return;
  try {
    const CHUNK=499;
    for(let i=0;i<inactive.length;i+=CHUNK){
      const batch=writeBatch(db);
      inactive.slice(i,i+CHUNK).forEach(t=>batch.delete(doc(db,'tags',t.id)));
      await batch.commit();
    }
    $('qrGrid').innerHTML='<div class="empty-state" style="grid-column:1/-1;"><span class="es-icon">📦</span><p>Configura y presiona "Generar QRs"</p></div>';
    $('batchCount').textContent='';
    toast(`🗑️ ${inactive.length} tags eliminados`);
  } catch(e){toast('❌ Error: '+e.message);}
});

// List
function renderList() {
  const q=$('searchTags').value.toLowerCase();
  const filter=$('filterStatus').value;
  const body=$('tagTableBody');
  const filtered=tags.filter(t=>
    (!q||t.id.toLowerCase().includes(q)||(t.petName||'').toLowerCase().includes(q)) &&
    (filter==='all'||t.status===filter)
  ).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  if(!filtered.length){
    body.innerHTML='<tr><td colspan="5" class="loading-state">Sin resultados</td></tr>'; return;
  }
  body.innerHTML=filtered.map(t=>`
    <tr>
      <td><span class="t-id">${t.id}</span></td>
      <td><span class="t-badge ${t.status}">${t.status==='active'?'✅ Activo':'⚪ Sin activar'}</span></td>
      <td style="font-size:13px;color:var(--gray-700);">${t.petName||'—'}</td>
      <td><span class="t-date">${t.createdAt?.split('T')[0]||'—'}</span></td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn btn-outline" style="padding:6px 12px;font-size:12px;" data-open="${t.id}">👁 Ver</button>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" data-delete="${t.id}">🗑️</button>
      </div></td>
    </tr>`).join('');
}

$('tagTableBody').addEventListener('click',async e=>{
  const openId=e.target.closest('[data-open]')?.dataset.open;
  const deleteId=e.target.closest('[data-delete]')?.dataset.delete;
  if(openId) window.open(`tag.html?id=${openId}`,'_blank');
  if(deleteId){
    if(!confirm(`¿Eliminar tag ${deleteId}?`)) return;
    try { await deleteDoc(doc(db,'tags',deleteId)); toast('🗑️ Tag eliminado'); }
    catch(err){toast('❌ Error: '+err.message);}
  }
});
$('searchTags').addEventListener('input',renderList);
$('filterStatus').addEventListener('change',renderList);

function updateStats() {
  const active=tags.filter(t=>t.status==='active').length;
  $('statTotal').textContent=tags.length;
  $('statActive').textContent=active;
  $('statInactive').textContent=tags.length-active;
  $('statRate').textContent=tags.length?Math.round(active/tags.length*100)+'%':'0%';
}
</script>
</body>
</html>
